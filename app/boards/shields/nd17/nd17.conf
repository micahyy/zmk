# 启用 RGB 支持
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y

# 使用 GPIO 模式（而不是 SPI）
CONFIG_WS2812_STRIP_GPIO=y

# RGB 配置
CONFIG_ZMK_RGB_UNDERGLOW_HUE_START=180
CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=3
CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=10
CONFIG_ZMK_RGB_UNDERGLOW_SPD_START=3
CONFIG_ZMK_RGB_UNDERGLOW_ON_START=y

# 颜色格式 - 对于 GPIO 模式可能不需要这些
# CONFIG_WS2812_STRIP_COLOR_MAPPING_RGB=y

# 电源管理（可选）
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=n
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_USB=y

# 特效数量
CONFIG_ZMK_RGB_UNDERGLOW_EXTRA_EFFECTS=y